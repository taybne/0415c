<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Chats - TAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
        background: #1a1a1a;
        scrollbar-gutter: stable;
      }
      .app {
        max-width: 420px;
        margin: 0 auto;
        background: #2a2a2a;
        min-height: 100vh;
        padding-bottom: 100px;
      }
      .header {
        background: #ffb6d9;
        color: white;
        padding: 20px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      .header h1 {
        font-size: 24px;
      }
      .back-btn {
        background: rgba(0, 0, 0, 0.45);
        border: none;
        color: white;
        padding: 10px 15px;
        border-radius: 20px;
        cursor: pointer;
      }
      .search-container {
        padding: 20px;
        border-bottom: 1px solid #444;
        background: #2a2a2a;
      }
      .search-input {
        width: 100%;
        padding: 12px;
        border: 2px solid #555;
        border-radius: 25px;
        font-size: 16px;
        background: #3a3a3a;
        color: #fff;
      }
      .users-list {
        max-height: 400px;
        overflow-y: auto;
        background: #2a2a2a;
      }
      .user-item {
        padding: 15px 20px;
        border-bottom: 1px solid #444;
        cursor: pointer;
        display: flex;
        align-items: center;
        background: #2a2a2a;
        color: #fff;
      }
      .user-item:hover {
        background: #333;
      }
      .user-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #ffb6d9;
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-right: 15px;
        font-weight: bold;
      }
      .user-info {
        flex: 1;
        min-width: 0;
      }
      .user-name {
        font-weight: 600;
        margin-bottom: 2px;
      }
      .last-message {
        font-size: 14px;
        color: #ccc;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-bottom: 2px;
      }
      .message-time {
        font-size: 12px;
        color: #888;
      }
      .chat-container {
        display: none;
        flex-direction: column;
        height: calc(100vh - 140px);
      }
      .chat-header {
        padding: 20px;
        border-bottom: 1px solid #444;
        background: #2a2a2a;
      }
      .chat-header h2 {
        color: #fff;
      }
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 20px;
        background: #2a2a2a;
      }
      .message {
        margin-bottom: 15px;
        padding: 10px 15px;
        border-radius: 20px;
        max-width: 70%;
      }
      .message.sent {
        background: #ffb6d9;
        color: white;
        margin-left: auto;
        text-align: right;
      }
      .message.received {
        background: #444;
        color: #ddd;
      }
      .message-time {
        font-size: 12px;
        opacity: 0.7;
        margin-top: 5px;
      }
      .message-image {
        max-width: 200px;
        max-height: 200px;
        border-radius: 10px;
        margin-top: 5px;
        display: block;
      }
      .message-file {
        display: inline-block;
        margin-top: 5px;
        padding: 5px 10px;
        background: rgba(255, 255, 255, 0.1);
        border-radius: 5px;
        text-decoration: none;
        color: inherit;
      }
      .message-file:hover {
        background: rgba(255, 255, 255, 0.2);
      }
      .location-message {
        cursor: pointer;
        padding: 8px 12px;
        background: rgba(255, 182, 217, 0.1);
        border-radius: 8px;
        margin-top: 5px;
        color: #ffb6d9;
        font-weight: 500;
      }
      .location-message:hover {
        background: rgba(255, 182, 217, 0.2);
      }
      .chat-input-container {
        padding: 20px;
        border-top: 1px solid #444;
        background: #2a2a2a;
        display: flex;
      }
      .attach-btn {
        padding: 12px;
        background: #555;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
        margin-right: 10px;
      }
      .chat-input {
        flex: 1;
        padding: 12px;
        border: 2px solid #555;
        border-radius: 25px;
        margin-right: 10px;
        background: #3a3a3a;
        color: #fff;
      }
      .send-btn {
        padding: 12px 20px;
        background: #ffb6d9;
        color: white;
        border: none;
        border-radius: 25px;
        cursor: pointer;
      }
      .search-input::placeholder,
      .chat-input::placeholder {
        color: #888;
      }
      .search-input:focus,
      .chat-input:focus {
        outline: none;
        border-color: #ffb6d9;
      }

      .bottom-nav {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        max-width: 420px;
        margin: 0 auto;
        background: #2a2a2a;
        border-top: 1px solid #444;
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 20px;
        z-index: 100;
      }

      .nav-button {
        flex: 1;
        padding: 12px 8px;
        border: none;
        background: none;
        cursor: pointer;
        font-size: 12px;
        font-weight: 500;
        color: #888;
        border-radius: 12px;
        transition: all 0.3s ease;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
      }

      .nav-icon {
        font-size: 24px;
        line-height: 1;
      }

      .nav-label {
        font-size: 12px;
        white-space: nowrap;
      }

      .nav-button:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
      }

      .nav-button.active {
        color: #ffb6d9;
        background: rgba(255, 182, 217, 0.1);
      }

      .modal {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.5);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 1000;
      }

      .modal.hidden {
        display: none;
      }

      .modal-content {
        background: #3a3a3a;
        padding: 24px;
        border-radius: 16px;
        max-width: 400px;
        width: 90%;
        color: #fff;
        position: relative;
      }

      .modal-close-btn {
        position: absolute;
        top: 12px;
        right: 12px;
        background: none;
        border: none;
        color: #888;
        font-size: 28px;
        cursor: pointer;
        padding: 0;
        width: 40px;
        height: 40px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        transition: all 0.2s ease;
      }

      .modal-close-btn:hover {
        color: #fff;
        background: rgba(255, 255, 255, 0.1);
      }

      .modal-content h2 {
        margin-bottom: 20px;
        text-align: center;
      }

      .profile-card {
        text-align: center;
        margin-bottom: 20px;
      }

      .profile-avatar {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        object-fit: cover;
        margin: 0 auto 12px;
        display: block;
      }

      .profile-info {
        color: #ddd;
      }

      .modal-actions {
        display: flex;
        gap: 12px;
        margin-top: 20px;
      }

      .location-share-card {
        display: flex;
        align-items: center;
        gap: 15px;
        margin: 20px 0;
        padding: 15px;
        background: #3a3a3a;
        border-radius: 12px;
      }

      .location-share-img {
        width: 60px;
        height: 60px;
        border-radius: 8px;
        object-fit: cover;
      }

      .location-share-info h3 {
        margin: 0 0 5px 0;
        color: #fff;
        font-size: 16px;
      }

      .location-share-info p {
        margin: 0;
        color: #ccc;
        font-size: 14px;
      }

      .chat-selection-list {
        max-height: 300px;
        overflow-y: auto;
        margin-top: 20px;
      }

      .chat-select-item {
        display: flex;
        align-items: center;
        padding: 15px;
        border-bottom: 1px solid #444;
        cursor: pointer;
        transition: background 0.2s;
      }

      .chat-select-item:hover {
        background: rgba(255, 255, 255, 0.05);
      }

      .chat-select-avatar {
        width: 40px;
        height: 40px;
        border-radius: 50%;
        background: #555;
        display: flex;
        align-items: center;
        justify-content: center;
        color: white;
        font-weight: bold;
        margin-right: 15px;
      }

      .chat-select-info h4 {
        margin: 0 0 5px 0;
        color: #fff;
        font-size: 16px;
      }

      .chat-select-info p {
        margin: 0;
        color: #ccc;
        font-size: 14px;
      }

      .location-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 15px;
        margin: 20px 0;
      }

      .location-img {
        width: 100%;
        max-width: 300px;
        height: 200px;
        border-radius: 12px;
        object-fit: cover;
      }

      .location-info p {
        color: #ddd;
        text-align: center;
        margin: 0;
      }

      .btn {
        flex: 1;
        padding: 10px 20px;
        border-radius: 12px;
        border: none;
        font-size: 14px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.3s ease;
      }

      .btn.secondary {
        background: #2a2a2a;
        color: #6c757d;
      }

      .btn.secondary:hover {
        background: #1a1a1a;
      }
    </style>
  </head>
  <body
    data-user-id="{{ current_user.id }}"
    data-user-name="{{ current_user.nickname }}"
  >
    <div class="app">
      <div class="header">
        <button class="back-btn" onclick="window.location.href = '/'">
          ← Back
        </button>
        <h1>Chats</h1>
        <div></div>
      </div>

      <div id="searchView">
        <div class="search-container">
          <input
            type="text"
            class="search-input"
            placeholder="Поиск пользователей..."
            id="searchInput"
          />
        </div>
        <div class="users-list" id="usersList">
        </div>
      </div>

      <div id="chatView" class="chat-container">
        <div class="chat-header">
          <h2 id="chatUserName">Chat</h2>
        </div>
        <div class="chat-messages" id="chatMessages">
        </div>
        <div class="chat-input-container">
          <input
            type="file"
            id="fileInput"
            accept="image/*,video/*,audio/*,application/*,text/*"
            style="display: none"
          />
          <button class="attach-btn" id="attachBtn">📎</button>
          <input
            type="text"
            class="chat-input"
            id="messageInput"
            placeholder="Type your message..."
          />
          <button class="send-btn" id="sendBtn">Send</button>
        </div>
      </div>

      <div id="profileModal" class="modal hidden">
        <div class="modal-content">
          <button class="modal-close-btn" id="profileCloseBtn">✕</button>
          <h2>Профиль</h2>
          <div class="profile-card">
            <img
              id="profileAvatar"
              src=""
              alt="Avatar"
              class="profile-avatar"
            />
            <div class="profile-info">
              <p id="profileNickname"></p>
            </div>
          </div>
          <div class="modal-actions">
            <button
              id="logoutBtn"
              class="btn secondary"
              onclick="window.location.href = '/logout'"
            >
               Выйти
            </button>
          </div>
        </div>
      </div>

      <div id="shareLocationModal" class="modal hidden">
        <div class="modal-content">
          <button class="modal-close-btn" id="shareLocationCloseBtn">✕</button>
          <h2>Отправить локацию</h2>
          <div class="location-share-card">
            <img id="shareLocationPhoto" src="" alt="" class="location-share-img" />
            <div class="location-share-info">
              <h3 id="shareLocationTitle"></h3>
              <p id="shareLocationDesc"></p>
            </div>
          </div>
          <div class="modal-actions">
            <button id="sendLocationBtn" class="btn primary">📤 Отправить</button>
            <button id="cancelShareBtn" class="btn secondary">Отмена</button>
          </div>
        </div>
      </div>

      <div id="selectChatModal" class="modal hidden">
        <div class="modal-content">
          <button class="modal-close-btn" id="selectChatCloseBtn">✕</button>
          <h2>Выберите чат для отправки локации</h2>
          <div id="chatSelectionList" class="chat-selection-list">

          </div>
        </div>
      </div>

      <div id="locationModal" class="modal hidden">
        <div class="modal-content">
          <button class="modal-close-btn" id="locationCloseBtn">✕</button>
          <h2 id="locationTitle"></h2>
          <div class="location-card">
            <img id="locationPhoto" src="" alt="" class="location-img" />
            <div class="location-info">
              <p id="locationDesc"></p>
            </div>
          </div>
        </div>
      </div>

      <div class="bottom-nav">
        <button id="chatsNavBtn" class="nav-button active">
          <span class="nav-icon">💬</span>
          <span class="nav-label">Chats</span>
        </button>
        <button id="feedNavBtn" class="nav-button">
          <span class="nav-icon">🌍</span>
          <span class="nav-label">Feed</span>
        </button>
        <button id="mapNavBtn" class="nav-button">
          <span class="nav-icon">🗺️</span>
          <span class="nav-label">Map</span>
        </button>
        <button id="profileNavBtn" class="nav-button">
          <span class="nav-icon">👤</span>
          <span class="nav-label">Profile</span>
        </button>
      </div>
    </div>

    <script>
      const socket = io();
      let currentChatUserId = null;
      let currentUserId = Number(document.body.dataset.userId) || null;
      let currentNickname = document.body.dataset.userName || "";
      let chatsList = [];

      socket.on("connect", () => {
        socket.emit("join", { user_id: currentUserId });
      });

      loadChatList();

      const shareLocationData = localStorage.getItem('shareLocation');
      if (shareLocationData) {
        const location = JSON.parse(shareLocationData);
        handleShareLocation(location);
        localStorage.removeItem('shareLocation');
      }

      document
        .getElementById("searchInput")
        .addEventListener("input", function () {
          const query = this.value.trim();
          if (query.length > 0) {
            fetch(`/api/search_users?q=${encodeURIComponent(query)}`)
              .then((response) => response.json())
              .then((users) => {
                displayUsers(users, false); 
              });
          } else {
            loadChatList(); 
          }
        });

      function loadChatList() {
        fetch("/api/chat_list")
          .then((response) => response.json())
          .then((chats) => {
            chatsList = chats;
            displayUsers(chats, true); 
          });
      }

      function displayUsers(users, isChatList = false) {
        const usersList = document.getElementById("usersList");
        usersList.innerHTML = "";
        users.forEach((user) => {
          const userDiv = document.createElement("div");
          userDiv.className = "user-item";
          userDiv.onclick = () => openChat(user.id, user.nickname);

          let content = `
                  <div class="user-avatar">${user.nickname.charAt(0).toUpperCase()}</div>
                  <div class="user-info">
                      <div class="user-name">${user.nickname}</div>
              `;

          if (isChatList && user.last_message) {
            const time = new Date(user.last_message_time).toLocaleTimeString(
              [],
              { hour: "2-digit", minute: "2-digit" },
            );
            content += `<div class="last-message">${user.has_file ? "📎 " : ""}${user.last_message}</div>`;
            content += `<div class="message-time">${time}</div>`;
          }

          content += `
                  </div>
              `;

          userDiv.innerHTML = content;
          usersList.appendChild(userDiv);
        });
      }

      function openChat(userId, nickname) {
        currentChatUserId = userId;
        document.getElementById("chatUserName").textContent = nickname;
        document.getElementById("searchView").style.display = "none";
        document.getElementById("chatView").style.display = "flex";

        document.querySelector(".back-btn").onclick = closeChat;

        fetch(`/api/messages/${userId}`)
          .then((response) => response.json())
          .then((messages) => {
            displayMessages(messages);
          });
      }

      function closeChat() {
        currentChatUserId = null;
        document.getElementById("chatView").style.display = "none";
        document.getElementById("searchView").style.display = "flex";

        document.querySelector(".back-btn").onclick = () =>
          (window.location.href = "/");

        loadChatList();
      }

      function displayMessages(messages) {
        const messagesDiv = document.getElementById("chatMessages");
        messagesDiv.innerHTML = "";
        messages.forEach((msg) => {
          const messageDiv = document.createElement("div");
          messageDiv.className = `message ${msg.sender_id == currentUserId ? "sent" : "received"}`;
          let content = `<div>${msg.message}</div>`;
          if (msg.location) {
            content += `<div class="location-message" onclick='openLocationModal(${JSON.stringify(msg.location).replace(/'/g, "\\'")})'>📍 ${msg.location.title}</div>`;
          }
          if (msg.file_url) {
            if (msg.file_type === "image") {
              content += `<img src="${msg.file_url}" alt="${msg.file_name}" class="message-image" />`;
            } else {
              content += `<a href="${msg.file_url}" target="_blank" class="message-file">📎 ${msg.file_name}</a>`;
            }
          }
          content += `<div class="message-time">${new Date(msg.created_at).toLocaleString()}</div>`;
          messageDiv.innerHTML = content;
          messagesDiv.appendChild(messageDiv);
        });
        messagesDiv.scrollTop = messagesDiv.scrollHeight;
      }

      document.getElementById("attachBtn").addEventListener("click", () => {
        document.getElementById("fileInput").click();
      });

      document
        .getElementById("fileInput")
        .addEventListener("change", async (e) => {
          const file = e.target.files[0];
          if (file) {
            const formData = new FormData();
            formData.append("file", file);

            try {
              const response = await fetch("/api/upload_file", {
                method: "POST",
                body: formData,
              });
              const result = await response.json();
              if (result.success) {
                sendMessage(
                  result.file_url,
                  result.file_type,
                  result.file_name,
                );
              } else {
                alert("Ошибка загрузки файла: " + result.error);
              }
            } catch (error) {
              alert("Ошибка загрузки файла");
            }
            e.target.value = ""; 
          }
        });

      document
        .getElementById("sendBtn")
        .addEventListener("click", () => sendMessage());
      document
        .getElementById("messageInput")
        .addEventListener("keypress", function (e) {
          if (e.key === "Enter") {
            sendMessage();
          }
        });

      function sendMessage(fileUrl = null, fileType = null, fileName = null) {
        const messageInput = document.getElementById("messageInput");
        const message = messageInput.value.trim();

        if ((message || fileUrl) && currentChatUserId) {
          socket.emit("private_message", {
            receiver_id: currentChatUserId,
            message: message,
            file_url: fileUrl,
            file_type: fileType,
            file_name: fileName,
          });
          messageInput.value = "";
        }
      }

      socket.on("new_private_message", (data) => {
        if (
          (data.sender_id == currentChatUserId &&
            data.receiver_id == currentUserId) ||
          (data.sender_id == currentUserId &&
            data.receiver_id == currentChatUserId)
        ) {
          const messagesDiv = document.getElementById("chatMessages");
          const messageDiv = document.createElement("div");
          messageDiv.className = `message ${data.sender_id == currentUserId ? "sent" : "received"}`;
          let content = `<div>${data.message}</div>`;
          if (data.location) {
            content += `<div class="location-message" onclick='openLocationModal(${JSON.stringify(data.location).replace(/'/g, "\\'")})'>📍 ${data.location.title}</div>`;
          }
          if (data.file_url) {
            if (data.file_type === "image") {
              content += `<img src="${data.file_url}" alt="${data.file_name}" class="message-image" />`;
            } else {
              content += `<a href="${data.file_url}" target="_blank" class="message-file">📎 ${data.file_name}</a>`;
            }
          }
          content += `<div class="message-time">${new Date(data.created_at).toLocaleString()}</div>`;
          messageDiv.innerHTML = content;
          messagesDiv.appendChild(messageDiv);
          messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        loadChatList();
      });

      const shareLocationModal = document.getElementById("shareLocationModal");
      const shareLocationCloseBtn = document.getElementById("shareLocationCloseBtn");
      const sendLocationBtn = document.getElementById("sendLocationBtn");
      const cancelShareBtn = document.getElementById("cancelShareBtn");
      const selectChatModal = document.getElementById("selectChatModal");
      const selectChatCloseBtn = document.getElementById("selectChatCloseBtn");

      shareLocationCloseBtn.onclick = () => shareLocationModal.classList.add("hidden");
      cancelShareBtn.onclick = () => shareLocationModal.classList.add("hidden");
      selectChatCloseBtn.onclick = () => selectChatModal.classList.add("hidden");

      sendLocationBtn.onclick = () => {
        const location = JSON.parse(localStorage.getItem('shareLocation') || '{}');
        sendLocationMessage(location);
        shareLocationModal.classList.add("hidden");
      };

      function handleShareLocation(location) {
        if (currentChatUserId) {
          showShareLocationModal(location);
        } else {
          showSelectChatModal(location);
        }
      }

      function showShareLocationModal(location) {
        document.getElementById("shareLocationTitle").textContent = location.title;
        document.getElementById("shareLocationDesc").textContent = location.desc;
        const photos = Array.isArray(location.photos) ? location.photos : [];
        document.getElementById("shareLocationPhoto").src = photos.length ? photos[0] : '';
        localStorage.setItem('shareLocation', JSON.stringify(location));
        shareLocationModal.classList.remove("hidden");
      }

      function showSelectChatModal(location) {
        const list = document.getElementById("chatSelectionList");
        list.innerHTML = "";
        chatsList.forEach((chat) => {
          const item = document.createElement("div");
          item.className = "chat-select-item";
          item.onclick = () => {
            openChat(chat.id, chat.nickname);
            selectChatModal.classList.add("hidden");
            setTimeout(() => sendLocationMessage(location), 500);
          };
          item.innerHTML = `
            <div class="chat-select-avatar">${chat.nickname.charAt(0).toUpperCase()}</div>
            <div class="chat-select-info">
              <h4>${chat.nickname}</h4>
              <p>${chat.last_message || "Нет сообщений"}</p>
            </div>
          `;
          list.appendChild(item);
        });
        selectChatModal.classList.remove("hidden");
      }

      function sendLocationMessage(location) {
        if (currentChatUserId) {
          socket.emit("private_message", {
            receiver_id: currentChatUserId,
            message: `Отправил локацию: ${location.title}`,
            location: location,
          });
        }
      }

      function openLocationModal(location) {
        document.getElementById("locationTitle").textContent = location.title;
        document.getElementById("locationDesc").textContent = location.desc;
        const photos = Array.isArray(location.photos) ? location.photos : [];
        document.getElementById("locationPhoto").src = photos.length ? photos[0] : '';
        document.getElementById("locationModal").classList.remove("hidden");
      }

      const locationModal = document.getElementById("locationModal");
      const locationCloseBtn = document.getElementById("locationCloseBtn");
      locationCloseBtn.onclick = () => locationModal.classList.add("hidden");

      locationModal.onclick = (e) => {
        if (e.target === locationModal) {
          locationModal.classList.add("hidden");
        }
      };

      shareLocationModal.onclick = (e) => {
        if (e.target === shareLocationModal) {
          shareLocationModal.classList.add("hidden");
        }
      };

      selectChatModal.onclick = (e) => {
        if (e.target === selectChatModal) {
          selectChatModal.classList.add("hidden");
        }
      };

    </script>
  </body>
</html>
