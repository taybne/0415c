<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Login - TAG</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: -apple-system, "SF Pro Display", system-ui, sans-serif;
        background: linear-gradient(135deg, #d79bb8 0%, #ffcce5 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .login-container {
        background: #3a3a3a;
        padding: 40px;
        border-radius: 20px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        width: 100%;
        max-width: 400px;
      }
      h1 {
        text-align: center;
        margin-bottom: 30px;
        color: #fff;
      }
      .form-group {
        margin-bottom: 20px;
      }
      label {
        display: block;
        margin-bottom: 5px;
        color: #ddd;
      }
      input[type="email"],
      input[type="password"] {
        width: 100%;
        padding: 12px;
        border: 2px solid #555;
        border-radius: 10px;
        font-size: 16px;
        background: #4a4a4a;
        color: #fff;
      }
      .btn {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        font-size: 16px;
        cursor: pointer;
        margin-bottom: 10px;
      }
      .btn-primary {
        background: linear-gradient(135deg, #ffb6d9 0%, #ffcce5 100%);
        color: white;
      }
      .btn-secondary {
        background: #4a4a4a;
        color: #ddd;
      }
      .error {
        color: red;
        text-align: center;
        margin-bottom: 20px;
      }
      .register-link {
        text-align: center;
        margin-top: 20px;
      }
      .register-link a {
        color: #ffb6d9;
        text-decoration: none;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <h1>Login to TAG</h1>
      {% if error %}
      <div class="error">{{ error }}</div>
      {% endif %}
      <form method="POST">
        <div class="form-group">
          <label for="nickname">Nickname</label>
          <input type="text" id="nickname" name="nickname" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required />
        </div>
        <button type="submit" class="btn btn-primary">Login</button>
      </form>
      <div class="register-link">
        <a href="{{ url_for('register') }}">Register</a>
      </div>
    </div>
  </body>
</html>
